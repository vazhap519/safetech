<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">SafeTech brand visual</title>
  <desc id="desc">Abstract secure infrastructure illustration with network nodes, dashboards, and gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#060915" />
      <stop offset="55%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#121d38" />
    </linearGradient>
    <radialGradient id="glowPrimary" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f7dff" stop-opacity=".55" />
      <stop offset="100%" stop-color="#4f7dff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowSecondary" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3ae8ff" stop-opacity=".45" />
      <stop offset="100%" stop-color="#3ae8ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#18233f" stop-opacity=".94" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity=".94" />
