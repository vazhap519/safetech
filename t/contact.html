<!DOCTYPE html>
<html lang="ka">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>კონტაქტი | SafeTech</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
primary:"#00C2FF",
darkbg:"#071A2B",
card:"#0F2538",
footer:"#050F1A"
}
}
}
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;}

html{scroll-behavior:smooth;}

.fade-in{
opacity:0;
transform:translateY(40px);
transition:all .8s ease;
}

.fade-in.visible{
opacity:1;
transform:translateY(0);
}
</style>

</head>

<body class="bg-darkbg text-white">

<!-- HEADER -->

<header class="border-b border-slate-800 sticky top-0 bg-darkbg z-50">

class="text-sm border border-primary px-4 py-2 rounded-md hover:bg-primary hover:text-darkbg transition">
მთავარზე დაბრუნება
</a>

</div>

</header>

<!-- HERO -->

<section class="py-24 text-center fade-in">

<h1 class="text-5xl font-extrabold mb-6">
დაგვიკავშირდი
</h1>

<p class="text-slate-400 max-w-xl mx-auto">
დაგვიტოვე ინფორმაცია და დაგიკავშირდებით მალე
</p>

</section>

<!-- CONTACT GRID -->

<section class="py-20 fade-in">

<div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12">

<!-- LEFT -->

<div>

<h2 class="text-3xl font-bold mb-6">
კონტაქტი
</h2>

<div class="space-y-4 text-slate-300">

<p>📞 +995 555 123 456</p>
<p>✉ info@safetech.ge</p>
<p>🕒 მუშაობის დრო: 10:00 - 20:00</p>

</div>

<!-- CTA -->

<a href="https://wa.me/995555123456"
class="inline-block mt-8 bg-primary text-darkbg px-6 py-3 rounded-md font-semibold hover:scale-105 transition">
მოგვწერე WhatsApp-ზე
</a>

</div>

<!-- FORM -->

<div class="bg-card p-8 rounded-xl">

<h3 class="text-xl font-semibold mb-6">
მოგვწერე
</h3>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST" class="space-y-4">

<input type="text" name="name" placeholder="სახელი"
class="w-full p-3 rounded bg-darkbg border border-slate-700">

<input type="tel" name="phone" placeholder="ტელეფონი"
class="w-full p-3 rounded bg-darkbg border border-slate-700">

<textarea name="message" placeholder="მოკლედ აღწერე პროექტი"
class="w-full p-3 rounded bg-darkbg border border-slate-700"></textarea>

<button class="bg-primary text-darkbg px-6 py-3 rounded-md w-full font-semibold hover:scale-105 transition">
გაგზავნა
</button>

</form>

</div>

</div>

</section>

<!-- CTA -->

<section class="py-20 text-center fade-in">

<h2 class="text-3xl font-bold mb-6">
გინდა სწრაფი პასუხი?
</h2>

<a href="https://wa.me/995555123456"

<!-- FOOTER -->

<footer class="bg-footer py-10 text-center text-slate-400 text-sm">
© 2026 SafeTech
</footer>

<!-- SCRIPT -->

<script>

const observer = new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("visible");
observer.unobserve(entry.target);
}
});
},{
threshold:0.15
});

document.querySelectorAll(".fade-in").forEach(el=>{
observer.observe(el);
});

</script>

</body>
</html>
