map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $request_method $safetech_cacheable_method {
    default 0;
    GET 1;
    HEAD 1;
}

map $request_method $safetech_cache_method {
    default $request_method;
    HEAD GET;
}

map $http_accept $safetech_html_request {
    default 0;
    ~*text/html 1;
}

map "$safetech_cacheable_method:$safetech_html_request" $safetech_skip_html_cache {
    default 1;
    "1:1" 0;
}

proxy_cache_path /var/cache/nginx/safetech
    levels=1:2
    keys_zone=safetech_html:4m
    max_size=64m
    inactive=1h
    use_temp_path=off;

upstream safetech_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Canonical frontend domain:
#   https://safetech.ge
#
# Redirected to the canonical HTTPS URL:
#   http://safetech.ge
#   http://www.safetech.ge
#   https://www.safetech.ge
#
# Important:
# 1. The default SAN certificate covers:
#    safetech.ge, www.safetech.ge, api.safetech.ge
# 2. Add optional typo aliases only after their DNS records and certificate
#    names are active.
# 3. Update certificate paths below if your Certbot lineage name differs.
# 4. Geo restriction expects a trusted country header:
#    - Cloudflare: CF-IPCountry (enable proxied DNS and restrict origin access).
#    - Nginx GeoIP2: set X-Country-Code to your GeoIP2 country variable.
#    Do not trust user-supplied country headers on a public origin.

server {
    listen 80;
    listen [::]:80;
    server_name
        safetech.ge
        www.safetech.ge;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://safetech.ge$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.safetech.ge;

    ssl_certificate /etc/letsencrypt/live/safetech.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safetech.ge/privkey.pem;

    return 301 https://safetech.ge$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name safetech.ge;

    ssl_certificate /etc/letsencrypt/live/safetech.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safetech.ge/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 25m;

    location /_next/static/ {
        alias /var/www/safetech-static/;
        access_log off;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /api/ {
        proxy_pass http://safetech_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    location / {
        proxy_pass http://safetech_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        # Enable only after the origin accepts traffic exclusively from Cloudflare:
        # proxy_set_header X-Country-Code $http_cf_ipcountry;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120;
        proxy_send_timeout 120;

        proxy_cache safetech_html;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$safetech_cache_method$host$request_uri";
        proxy_cache_bypass $safetech_skip_html_cache;
        proxy_no_cache $safetech_skip_html_cache;
        proxy_cache_valid 200 1m;
        proxy_cache_min_uses 1;
        proxy_cache_lock on;
        proxy_cache_lock_age 10s;
        proxy_cache_lock_timeout 10s;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Cache-Control Expires;

        add_header X-SafeTech-Cache $upstream_cache_status always;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.safetech.ge;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://api.safetech.ge$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.safetech.ge;

    ssl_certificate /etc/letsencrypt/live/safetech.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safetech.ge/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, nosnippet" always;

    root /var/www/safetech-api/public;
    index index.php;

    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /storage/ {
        try_files $uri $uri/ =404;
        access_log off;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        # Enable only after the origin accepts traffic exclusively from Cloudflare:
        # fastcgi_param HTTP_X_COUNTRY_CODE $http_cf_ipcountry;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
