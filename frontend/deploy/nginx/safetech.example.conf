map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream safetech_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Canonical frontend domain:
#   https://safetech.ge
#
# Redirect aliases:
#   http://safetech.ge
#   http://www.safetech.ge
#   http://saftech.ge
#   https://saftech.ge
#   http://www.saftech.ge
#   https://www.saftech.ge
#
# Important:
# 1. Point A/AAAA records for every alias you want to redirect.
# 2. Issue one SAN certificate that covers:
#    safetech.ge, www.safetech.ge, saftech.ge, www.saftech.ge
# 3. Update certificate paths below if your Certbot lineage name differs.
# 4. Geo restriction expects a trusted country header:
#    - Cloudflare: CF-IPCountry (enable proxied DNS and restrict origin access).
#    - Nginx GeoIP2: set X-Country-Code to your GeoIP2 country variable.
#    Do not trust user-supplied country headers on a public origin.

server {
    listen 80;
    listen [::]:80;
    server_name
        safetech.ge
        www.safetech.ge
        saftech.ge
        www.saftech.ge;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://safetech.ge$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name
        www.safetech.ge
        saftech.ge
        www.saftech.ge;

    ssl_certificate /etc/letsencrypt/live/safetech.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safetech.ge/privkey.pem;

    return 301 https://safetech.ge$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name safetech.ge;

    ssl_certificate /etc/letsencrypt/live/safetech.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safetech.ge/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 25m;

    location /_next/static/ {
        alias /var/www/safetech-next/.next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://safetech_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header X-Country-Code $http_cf_ipcountry;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.safetech.ge;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://api.safetech.ge$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.safetech.ge;

    ssl_certificate /etc/letsencrypt/live/api.safetech.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.safetech.ge/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/safetech-api/public;
    index index.php;

    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        try_files $uri $uri/ =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_CF_IPCOUNTRY $http_cf_ipcountry;
        fastcgi_param HTTP_X_COUNTRY_CODE $http_cf_ipcountry;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
