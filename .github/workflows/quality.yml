name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Laravel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: back
    env:
      APP_ENV: testing
      APP_KEY: "00000000000000000000000000000000"
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      SEED_DEMO_CONTENT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, sqlite3, gd, exif
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: Reject tracked runtime uploads
        run: |
          if git ls-files 'storage/media-library/temp/**' | grep -q .; then
            echo 'Temporary media-library uploads must not be committed.' >&2
            exit 1
          fi

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit PHP dependencies
        run: composer audit --locked --no-interaction

      - name: Check PHP formatting
        run: vendor/bin/pint --test

      - name: Verify fresh database and seeders
        run: php artisan migrate:fresh --seed --force

      - name: Run Laravel tests
        run: php artisan test

  frontend:
    name: Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      BACKEND_API_URL: https://api.safetech.ge/api
      NEXT_PUBLIC_API_URL: https://api.safetech.ge/api
      NEXT_PUBLIC_SITE_URL: https://safetech.ge
      REVALIDATE_SECRET: ci-only-revalidate-secret-not-used-in-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint, type-check, and build
        run: npm run check

  deployment-script:
    name: Deployment script
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n deploy.sh

      - name: Run ShellCheck
        run: shellcheck deploy.sh
